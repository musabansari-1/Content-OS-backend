services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      WEB_CONCURRENCY: "1"
    command: >
      sh -c "uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${WEB_CONCURRENCY:-1}"
    ports:
      - "8000:8000"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/check').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
